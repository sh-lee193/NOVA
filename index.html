function ChatPage({user,onLog}) {
  const [msgs,setMsgs]=useState([{role:"nova",text:`안녕하세요, ${user.name} ${user.title}님! 👋\n\nNOVA입니다. 법인차량, 직인 날인, 비품 구매, 채용 면접, 증명서 발급 등 P&C팀 관련 업무라면 무엇이든 도와드릴게요!\n\n궁금하신 점을 편하게 말씀해 주세요 😊`,ts:Date.now()}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false);
  const bottom=useRef(null); const inputEl=useRef(null);
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const chips=["법인차량 운행일지 제출 방법","직인 날인 신청하려면?","비품 구매 요청 방법","4대보험 완납증명서 발급"];

  async function send(text) {
    text=(text||input).trim(); if(!text||busy)return;
    setInput("");
    const cat=classify(text);
    setMsgs(prev=>[...prev,{role:"user",text,cat,ts:Date.now()}]);
    onLog({text,cat,user:user.name,dept:user.dept,ts:Date.now()});
    setBusy(true);
    try {
      const history=msgs.slice(1).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      history.push({role:"user",content:text});
      const res=await fetch("/api/chat",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:SYS,messages:history}),
      });
      const d=await res.json();
      const reply=d.content?.[0]?.text||"죄송합니다, 잠시 후 다시 시도해 주세요.";
      setMsgs(prev=>[...prev,{role:"nova",text:reply,ts:Date.now()}]);
    } catch {
      setMsgs(prev=>[...prev,{role:"nova",text:"네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.",ts:Date.now()}]);
    }
    setBusy(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#f0f5ff"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"white",borderBottom:"1px solid #e5e7eb",boxShadow:"0 1px 6px rgba(30,58,138,.06)"}}>
        <NovaAvatar size={42} glow={busy}/>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:800,color:"#1e3a8a",letterSpacing:"-0.02em"}}>NOVA</div>
          <div style={{fontSize:11,color:busy?"#f59e0b":"#10b981",display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:busy?"#f59e0b":"#10b981"}}/>
            {busy?"답변 생성 중...":"온라인 · 언제든지 물어보세요"}
          </div>
        </div>
        <div style={{fontSize:11,color:"#9ca3af"}}>딥노이드 임직원 전용</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px 8px",display:"flex",flexDirection:"column",gap:14}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:10,flexDirection:m.role==="user"?"row-reverse":"row",alignItems:"flex-end",animation:"fadeIn .25s ease"}}>
            {m.role==="nova"&&<NovaAvatar size={34}/>}
            {m.role==="user"&&<div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"white",flexShrink:0}}>{user.name[0]}</div>}
            <div style={{maxWidth:"74%"}}>
              {m.cat&&<div style={{display:"inline-flex",alignItems:"center",fontSize:9,fontWeight:700,padding:"2px 9px",borderRadius:12,marginBottom:5,background:CAT_COLOR[m.cat]||"#6b7280",color:"white",letterSpacing:".04em"}}>{m.cat}</div>}
              <div style={{padding:"11px 15px",fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.role==="user"?"linear-gradient(135deg,#2563eb,#1d4ed8)":"white",color:m.role==="user"?"white":"#111827",boxShadow:m.role==="user"?"0 4px 14px rgba(29,78,216,.25)":"0 2px 10px rgba(0,0,0,.06)",border:m.role==="nova"?"1px solid #e5e7eb":"none"}}>{m.text}</div>
            </div>
          </div>
        ))}
        {busy&&<div style={{display:"flex",gap:10,alignItems:"flex-end"}}><NovaAvatar size={34}/><div style={{padding:"13px 16px",background:"white",borderRadius:"18px 18px 18px 4px",border:"1px solid #e5e7eb",boxShadow:"0 2px 10px rgba(0,0,0,.06)",display:"flex",gap:5,alignItems:"center"}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#93c5fd",animation:`novaDot 1.2s ease-in-out ${i*.2}s infinite`}}/>)}</div></div>}
        <div ref={bottom}/>
      </div>
      <div style={{padding:"8px 20px",background:"white",borderTop:"1px solid #f3f4f6",display:"flex",gap:6,flexWrap:"wrap"}}>
        {chips.map(q=><button key={q} onClick={()=>send(q)} style={{padding:"5px 12px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:20,fontSize:11,color:"#1d4ed8",cursor:"pointer",fontWeight:600}}>{q}</button>)}
      </div>
      <div style={{padding:"12px 20px 16px",background:"white",display:"flex",gap:10}}>
        <input ref={inputEl} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()}
          placeholder="궁금한 점을 자유롭게 입력하세요..." style={{flex:1,padding:"12px 16px",border:"1.5px solid #bfdbfe",borderRadius:14,fontSize:14,outline:"none",background:"#f8faff",transition:"border-color .15s"}}
          onFocus={e=>e.target.style.borderColor="#2563eb"} onBlur={e=>e.target.style.borderColor="#bfdbfe"}/>
        <button onClick={()=>send()} disabled={!input.trim()||busy} style={{width:48,height:48,borderRadius:14,border:"none",flexShrink:0,background:(!input.trim()||busy)?"#bfdbfe":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"white",fontSize:20,cursor:(!input.trim()||busy)?"not-allowed":"pointer",boxShadow:(!input.trim()||busy)?"none":"0 4px 12px rgba(29,78,216,.35)",transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center"}}>→</button>
      </div>
    </div>
  );
}

/* ── 분석 ── */
function AnalyticsPage({qs}) {
  const cats={},users={};
  qs.forEach(q=>{cats[q.cat]=(cats[q.cat]||0)+1;users[q.user]=(users[q.user]||0)+1;});
  const maxC=Math.max(1,...Object.values(cats));
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  return (
    <div style={{flex:1,overflowY:"auto",padding:"1.5rem",background:"#f0f5ff"}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1e3a8a",marginBottom:"1.25rem",letterSpacing:"-0.02em"}}>📊 문의 분석 대시보드</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:"1.25rem"}}>
        {[{l:"총 문의 건수",v:qs.length,c:"#2563eb"},{l:"카테고리 수",v:Object.keys(cats).length,c:"#7c3aed"},{l:"문의 사용자",v:Object.keys(users).length,c:"#059669"}].map(k=>(
          <div key={k.l} style={{background:"white",borderRadius:14,padding:"1rem 1.25rem",border:"1px solid #e5e7eb",boxShadow:"0 2px 8px rgba(30,58,138,.05)"}}>
            <div style={{fontSize:30,fontWeight:800,color:k.c,letterSpacing:"-0.03em"}}>{k.v}</div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{k.l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:14,padding:"1.25rem",border:"1px solid #e5e7eb",marginBottom:"1.25rem"}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginBottom:"1rem"}}>카테고리별 문의 빈도</h3>
        {qs.length===0?(
          <div style={{textAlign:"center",color:"#9ca3af",padding:"2.5rem",fontSize:13}}><div style={{fontSize:32,marginBottom:8}}>📭</div>아직 문의 데이터가 없습니다.<br/>NOVA 채팅에서 질문하시면 자동으로 기록됩니다.</div>
        ):sorted.map(([cat,cnt])=>(
          <div key={cat} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:3,background:CAT_COLOR[cat]||"#6b7280"}}/><span style={{fontWeight:600,color:"#374151"}}>{cat}</span></div>
              <span style={{color:"#6b7280",fontWeight:500}}>{cnt}건 ({Math.round(cnt/qs.length*100)}%)</span>
            </div>
            <div style={{height:8,background:"#f3f4f6",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${cnt/maxC*100}%`,background:CAT_COLOR[cat]||"#2563eb",borderRadius:4,transition:"width .6s ease"}}/></div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:14,padding:"1.25rem",border:"1px solid #e5e7eb"}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginBottom:"1rem"}}>최근 문의 내역</h3>
        {qs.length===0?<div style={{textAlign:"center",color:"#9ca3af",padding:"2rem",fontSize:12}}>데이터 없음</div>
        :[...qs].reverse().slice(0,20).map((q,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:i<19?"1px solid #f3f4f6":"none"}}>
            <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:10,background:CAT_COLOR[q.cat]||"#6b7280",color:"white",flexShrink:0,marginTop:2,whiteSpace:"nowrap"}}>{q.cat}</span>
            <div style={{flex:1}}><div style={{fontSize:12,color:"#111827",lineHeight:1.4}}>{q.text}</div><div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>{q.user} · {q.dept}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── FAQ ── */
function FAQPage() {
  const [open,setOpen]=useState(null);
  const groups={};
  FAQS.forEach(f=>{if(!groups[f.cat])groups[f.cat]=[];groups[f.cat].push(f);});
  return (
    <div style={{flex:1,overflowY:"auto",padding:"1.5rem",background:"#f0f5ff"}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1e3a8a",marginBottom:"1.25rem",letterSpacing:"-0.02em"}}>📋 FAQ 라이브러리</h2>
      {Object.entries(groups).map(([cat,faqs])=>(
        <div key={cat} style={{marginBottom:"1.25rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:4,height:20,background:CAT_COLOR[cat],borderRadius:2}}/><h3 style={{fontSize:13,fontWeight:700,color:"#374151"}}>{cat}</h3><div style={{fontSize:10,color:"#9ca3af"}}>{faqs.length}개</div></div>
          {faqs.map((f,i)=>{
            const key=`${cat}-${i}`;
            return (
              <div key={i} onClick={()=>setOpen(open===key?null:key)} style={{background:"white",border:`1.5px solid ${open===key?CAT_COLOR[cat]:"#e5e7eb"}`,borderRadius:12,padding:"12px 16px",marginBottom:6,cursor:"pointer",transition:"all .15s",boxShadow:open===key?`0 4px 14px ${CAT_COLOR[cat]}25`:"0 1px 4px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#111827",lineHeight:1.4}}>Q. {f.q}</div>
                  <div style={{fontSize:12,color:"#9ca3af",flexShrink:0,transform:open===key?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
                </div>
                {open===key&&<div style={{marginTop:10,padding:"10px 14px",background:"#eff6ff",borderRadius:8,fontSize:12,color:"#1e40af",lineHeight:1.7,borderLeft:`3px solid ${CAT_COLOR[cat]}`}}>A. {f.a}</div>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

  const docs=[
    {title:"법인차량 운행 지침",cat:"법인차량",desc:"차량별 사용 규정, 운행일지 양식, 주유·세차 기준"},
    {title:"전자결재 기안 가이드",cat:"기안·결재",desc:"기안서 종류별 결재라인 및 첨부서류 기준"},
    {title:"신규입사자 온보딩 핸드북",cat:"채용·면접",desc:"입사 첫날 준비사항, 자리배치, 웰컴런치 가이드"},
    {title:"비품 구매 프로세스",cat:"비품·구매",desc:"품의서 작성 기준, 오피스디포 거래명세서 활용법"},
    {title:"출장·법인카드 이용 지침",cat:"출장·법인카드",desc:"항공권 예약 절차, 법인카드 한도 기준, 정산 방법"},
    {title:"두바이 지사 행정 매뉴얼",cat:"기타",desc:"해외 지사 행정 처리, 재무제표 관련 안내"},
  ];
  return (
    <div style={{flex:1,overflowY:"auto",padding:"1.5rem",background:"#f0f5ff"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:20,fontWeight:800,color:"#1e3a8a",letterSpacing:"-0.02em"}}>📁 지침·규정 자료실</h2>
        <div style={{fontSize:11,padding:"4px 12px",background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:20,color:"#92400e",fontWeight:600}}>🚧 문서 연결 준비 중</div>
      </div>
      <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:14,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",alignItems:"flex-start",gap:14}}>
        <div style={{fontSize:28,flexShrink:0}}>📌</div>
        <div><div style={{fontSize:13,fontWeight:700,color:"#1e40af",marginBottom:4}}>NOVA와 문서를 연결하면 더 정확한 답변이 가능합니다</div><div style={{fontSize:12,color:"#3b82f6",lineHeight:1.6}}>아래 지침 문서들을 이 자료실에 업로드하면 NOVA가 문서 내용 기반으로 더 정확한 답변을 제공합니다.</div></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
        {docs.map((d,i)=>(
          <div key={i} style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"1rem 1.25rem",display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 4px rgba(30,58,138,.05)"}}>
            <div style={{width:44,height:44,borderRadius:10,background:CAT_COLOR[d.cat]||"#2563eb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📄</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#111827"}}>{d.title}</div><div style={{fontSize:11,color:"#6b7280",marginTop:3}}>{d.desc}</div></div>
            <button style={{fontSize:11,padding:"5px 12px",background:"#f3f4f6",border:"none",borderRadius:8,color:"#6b7280",cursor:"pointer",fontWeight:500}}>연결 예정</button>
          </div>
        ))}
      </div>
      <div style={{background:"white",border:"2px dashed #bfdbfe",borderRadius:14,padding:"2.5rem",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:10}}>📎</div>
        <div style={{fontSize:14,fontWeight:700,color:"#1d4ed8",marginBottom:6}}>문서 업로드 및 연결 기능 추가 예정</div>
        <div style={{fontSize:12,color:"#6b7280",lineHeight:1.7}}>P&C팀 내부 지침 문서를 이 자료실에 연결하면<br/>NOVA가 문서 기반으로 더 정확한 맞춤 답변을 제공합니다.</div>
      </div>
    </div>
  );
}

/* ── 메인 앱 ── */
function App() {
  const [page,setPage]=useState("login");
  const [user,setUser]=useState(null);
  const [qs,setQs]=useState(()=>lsGet("nova-qs")||[]);

  function addQ(q) { setQs(prev=>{const n=[...prev,q];lsSet("nova-qs",n);return n;}); }

  if(page==="login") return <LoginPage onLogin={u=>{setUser(u);setPage("chat");}}/>;
  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <Sidebar page={page} setPage={setPage} user={user} onLogout={()=>{setUser(null);setPage("login");}}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {page==="chat"&&<ChatPage user={user} onLog={addQ}/>}
        {page==="analytics"&&<AnalyticsPage qs={qs}/>}
        {page==="faq"&&<FAQPage/>}
        {page==="guidelines"&&<GuidelinesPage/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>P&C FAQ 챗봇</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f5ff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1.2);opacity:1}}

/* 헤더 */
.header{background:#1e3a8a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:15px;font-weight:700;color:white}
.header-sub{font-size:11px;color:#93c5fd;margin-top:2px}
.status{display:flex;align-items:center;gap:6px;font-size:11px;color:#93c5fd}
.dot{width:7px;height:7px;border-radius:50%;background:#10b981}
.dot.busy{background:#f59e0b}

/* 메시지 영역 */
.body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;align-items:flex-end;animation:fadeIn .25s ease}
.msg.user{flex-direction:row-reverse}

/* 말풍선 */
.bubble{padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap;max-width:78%}
.bubble.bot{background:white;border-radius:18px 18px 18px 4px;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #e5e7eb;color:#111827}
.bubble.user{background:#1d4ed8;border-radius:18px 18px 4px 18px;color:white;box-shadow:0 3px 10px rgba(29,78,216,.25)}
.catBadge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px;color:white}

/* 타이핑 */
.typing{display:flex;gap:5px;align-items:center;padding:12px 14px;background:white;border-radius:18px 18px 18px 4px;border:1px solid #e5e7eb}
.typing span{width:6px;height:6px;border-radius:50%;background:#93c5fd;display:inline-block}
.typing span:nth-child(1){animation:dot 1.2s .0s infinite}
.typing span:nth-child(2){animation:dot 1.2s .2s infinite}
.typing span:nth-child(3){animation:dot 1.2s .4s infinite}

/* 바로가기 */
.chips{padding:8px 16px;background:white;border-top:1px solid #f3f4f6;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.chip{padding:5px 11px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;font-size:11px;color:#1d4ed8;cursor:pointer;font-weight:600;white-space:nowrap}
.chip:hover{background:#dbeafe}

/* 입력 */
.footer{padding:10px 16px 14px;background:white;display:flex;gap:10px;flex-shrink:0}
.input{flex:1;padding:11px 15px;border:1.5px solid #bfdbfe;border-radius:14px;font-size:14px;outline:none;background:#f8faff;transition:border-color .15s}
.input:focus{border-color:#2563eb}
.send{width:46px;height:46px;border-radius:14px;border:none;background:#1d4ed8;color:white;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(29,78,216,.3);transition:opacity .15s}
.send:disabled{background:#bfdbfe;box-shadow:none;cursor:not-allowed}

/* 관리자 버튼 */
.adminBtn{font-size:11px;padding:4px 10px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#bfdbfe;cursor:pointer}

/* 관리자 모달 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.mbox{background:white;border-radius:20px;padding:1.5rem;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.adminPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.adminPanel.open{display:flex}
.abox{background:white;border-radius:20px;width:min(820px,95vw);height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.ahead{padding:1rem 1.25rem;background:#1e3a8a;display:flex;align-items:center;justify-content:space-between}
.atabs{padding:8px 16px;border-bottom:1px solid #e5e7eb;display:flex;gap:6px}
.atab{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#6b7280}
.atab.on{background:#1d4ed8;color:white}
.abody{flex:1;overflow-y:auto;padding:1.25rem}
.inp2{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;margin-bottom:8px;box-sizing:border-box}
.inp2:focus{border-color:#2563eb}
.btn1{padding:8px 16px;background:#1d4ed8;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.btn2{padding:8px 16px;background:#f3f4f6;border:none;border-radius:8px;font-size:12px;cursor:pointer}
.faqItem{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:7px;overflow:hidden}
.faqRow{padding:11px 13px;display:flex;gap:8px;align-items:flex-start}
.bar{height:6px;background:#f3f4f6;border-radius:3px;margin-top:3px;overflow:hidden}
select{width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;outline:none;margin-bottom:8px;font-family:inherit}
textarea{resize:none;font-family:inherit}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>P&C 업무 FAQ 챗봇</h1>
    <div class="header-sub">딥노이드 인사총무팀 · 이성훈 과장 전용</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusTxt">대기 중</span></div>
    <button class="adminBtn" onclick="openAdminLogin()">⚙️ 관리</button>
  </div>
</div>

<div class="body" id="chatBody"></div>

<div class="chips" id="chips">
  <button class="chip" onclick="qs('법인차량 운행일지 제출 방법')">법인차량 운행일지</button>
  <button class="chip" onclick="qs('직인 날인 신청 방법')">직인 날인 신청</button>
  <button class="chip" onclick="qs('비품 구매 요청 방법')">비품 구매 요청</button>
  <button class="chip" onclick="qs('4대보험 완납증명서 발급')">4대보험 증명서</button>
  <button class="chip" onclick="qs('신규입사자 온보딩 절차')">신규 온보딩</button>
</div>

<div class="footer">
  <input class="input" id="inp" placeholder="궁금한 내용을 입력하세요..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="document.getElementById('sendBtn').disabled=!this.value.trim()"/>
  <button class="send" id="sendBtn" onclick="send()" disabled>→</button>
</div>

<!-- 관리자 로그인 -->
<div class="modal" id="loginModal">
  <div class="mbox">
    <div style="font-size:15px;font-weight:700;color:#1e3a8a;margin-bottom:14px">⚙️ 관리자 인증</div>
    <input type="password" class="inp2" id="pwInp" placeholder="비밀번호" onkeydown="if(event.key==='Enter')chkPw()"/>
    <div id="pwErr" style="font-size:12px;color:#dc2626;margin-bottom:8px;display:none">비밀번호가 올바르지 않습니다.</div>
    <div style="display:flex;gap:8px">
      <button class="btn2" onclick="closeLogin()" style="flex:1">취소</button>
      <button class="btn1" onclick="chkPw()" style="flex:2">확인</button>
    </div>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="adminPanel" id="adminPanel">
  <div class="abox">
    <div class="ahead">
      <div>
        <div style="font-size:14px;font-weight:700;color:white">관리자 패널</div>
        <div style="font-size:11px;color:#93c5fd">FAQ 수정 · 문의 분석</div>
      </div>
      <button onclick="closeAdmin()" style="background:rgba(255,255,255,.15);border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px">×</button>
    </div>
    <div class="atabs">
      <button class="atab on" onclick="tab('faq',this)">📋 FAQ 관리</button>
      <button class="atab" onclick="tab('stats',this)">📊 문의 통계</button>
    </div>
    <div class="abody" id="abody"></div>
  </div>
</div>

<script>
const ADMIN_PW = "deepnoid2024!";
const CAT_COLOR = {
  "법인차량":"#2563eb","직인·계약":"#7c3aed","비품·구매":"#0891b2",
  "채용·면접":"#059669","증명서·서류":"#d97706","시설·총무":"#dc2626",
  "기안·결재":"#4f46e5","출장·법인카드":"#0369a1","복리후생·HR":"#db2777","기타":"#6b7280"
};
const CATS = {
  "법인차량":["차량","운행일지","법인차","차키","주행","렌트","셀토스","스포티지"],
  "직인·계약":["직인","날인","계약서","서명","인감","공문"],
  "비품·구매":["비품","구매","소모품","사무용품","책상","키보드","마우스","스탠딩"],
  "채용·면접":["채용","면접","지원자","포지션","인터뷰","합격","이력서","온보딩"],
  "증명서·서류":["4대보험","증명서","재직","완납","인정서"],
  "시설·총무":["주차","출입카드","명함","에어컨","시설","모바일카드"],
  "기안·결재":["기안","품의","결재","전자결재"],
  "출장·법인카드":["출장","항공","숙소","여비","법인카드"],
  "복리후생·HR":["복리후생","휴가","연차","경조사","급여"]
};
const DEFAULT_FAQS = [
  {id:1,cat:"법인차량",q:"법인차량 운행일지는 언제까지 제출하나요?",a:"매월 5일까지 전월 운행일지 + 계기판 사진을 sh.lee@deepnoid.com으로 제출해 주세요."},
  {id:2,cat:"직인·계약",q:"직인(법인인감) 날인은 어떻게 신청하나요?",a:"① ERP 인감사용신청서 기안 ② 승인 후 이성훈 과장 Teams 방문 요청 ③ 직접 날인."},
  {id:3,cat:"증명서·서류",q:"4대보험 완납증명서 발급은 어떻게 받나요?",a:"P&C팀 김유리 대리(yrkim@deepnoid.com)에게 요청하시면 당일 발급 가능합니다."},
  {id:4,cat:"비품·구매",q:"사무용품 구매는 어떻게 요청하나요?",a:"종류·수량·용도를 이성훈 과장에게 알려주세요. 10만원 이상 시 품의서 기안 필요합니다."},
  {id:5,cat:"기안·결재",q:"기안품의서 결재라인은 어떻게 구성하나요?",a:"일반: 팀장→본부장. 10만원 이상 지출 건은 대표이사 결재까지 필요합니다."},
  {id:6,cat:"채용·면접",q:"신규입사자 온보딩 준비는 어떻게 하나요?",a:"자리세팅·장비지급은 P&C팀 담당. 웰컴런치는 팀장+동일직군 팀원 필수 참석."},
  {id:7,cat:"시설·총무",q:"주차 등록은 어떻게 하나요?",a:"차량번호를 이성훈 과장에게 Teams 메시지로 전달해 주시면 등록해 드립니다."},
  {id:8,cat:"출장·법인카드",q:"해외출장 항공권 예약은 어떻게 하나요?",a:"출발일·목적지·인원을 P&C팀에 사전 요청해 주세요. 법인카드 한도: 재경팀 한유정 대리."},
  {id:9,cat:"시설·총무",q:"명함 제작은 어떻게 신청하나요?",a:"이성훈 과장에게 명함 정보 전달 → 시안 확인 후 회신 → 약 3~5 영업일 제작."},
  {id:10,cat:"시설·총무",q:"모바일 출입카드 재발급은?",a:"폰을 교체하셨다면 이성훈 과장에게 Teams로 재발급을 요청해 주세요."}
];

function ls(k,v){if(v!==undefined){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}else{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch{return null;}}}
let faqs=ls("daon-faqs")||DEFAULT_FAQS;
let qlog=ls("daon-qs")||[];
let msgs=[];
let busy=false;

function classify(t){
  t=t.toLowerCase();
  for(const[c,ks]of Object.entries(CATS))if(ks.some(k=>t.includes(k)))return c;
  return "기타";
}
function buildSys(){
  return `당신은 딥노이드(Deepnoid) P&C팀(인사총무팀) 이성훈 과장의 업무 보조 AI 챗봇입니다.
임직원들이 P&C팀에 자주 묻는 질문에 대해 친절하고 명확하게 한국어로 답변합니다.
답변은 3~5줄로 간결하게 작성하고, 담당자 연락처를 포함하세요.

[FAQ 지식베이스]
${faqs.map(f=>`[${f.cat}] Q:${f.q} A:${f.a}`).join("\n")}

[추가 지침]
- 모르는 내용: "P&C팀 이성훈 과장(sh.lee@deepnoid.com / 010-9588-0153)에게 문의해 주세요."
- 모든 답변 끝에: "추가 문의사항이 있으시면 언제든지 말씀해 주세요 😊" 추가`;
}

// 메시지 추가
function addMsg(role,text,cat){
  const body=document.getElementById("chatBody");
  const div=document.createElement("div");
  div.className="msg "+role+" fade";
  if(role==="bot"){
    div.innerHTML=`<div class="bubble bot">${text.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>`;
  } else {
    const badge=cat?`<div class="catBadge" style="background:${CAT_COLOR[cat]||"#6b7280"}">${cat}</div><br>`:"";
    div.innerHTML=`<div style="text-align:right">${badge}<div class="bubble user">${text.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div></div>`;
  }
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
  msgs.push({role:role==="user"?"user":"assistant",content:text});
}
function showTyping(){
  const body=document.getElementById("chatBody");
  const div=document.createElement("div");
  div.className="msg bot";div.id="typing";
  div.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
  body.appendChild(div);body.scrollTop=body.scrollHeight;
}
function hideTyping(){const el=document.getElementById("typing");if(el)el.remove();}
function setBusy(b){
  busy=b;
  document.getElementById("sendBtn").disabled=b||!document.getElementById("inp").value.trim();
  const dot=document.getElementById("statusDot");
  const txt=document.getElementById("statusTxt");
  if(b){dot.className="dot busy";txt.textContent="답변 생성 중...";}
  else{dot.className="dot";txt.textContent="대기 중";}
}

// 전송
async function send(text){
  text=text||document.getElementById("inp").value.trim();
  if(!text||busy)return;
  document.getElementById("inp").value="";
  document.getElementById("sendBtn").disabled=true;
  const cat=classify(text);
  addMsg("user",text,cat);
  qlog.push({text,cat,ts:Date.now()});ls("daon-qs",qlog);
  setBusy(true);showTyping();
  try{
    const history=msgs.slice(-8).map(m=>({role:m.role,content:m.content}));
    const res=await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,system:buildSys(),messages:history})
    });
    const d=await res.json();
    const reply=d.content?.[0]?.text||d.error?.message||"잠시 후 다시 시도해 주세요.";
    hideTyping();addMsg("bot",reply);
  }catch{hideTyping();addMsg("bot","연결 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");}
  setBusy(false);
}
function qs(q){send(q);}

// 관리자
function openAdminLogin(){document.getElementById("loginModal").classList.add("open");setTimeout(()=>document.getElementById("pwInp").focus(),100);}
function closeLogin(){document.getElementById("loginModal").classList.remove("open");document.getElementById("pwInp").value="";document.getElementById("pwErr").style.display="none";}
function chkPw(){
  if(document.getElementById("pwInp").value===ADMIN_PW){closeLogin();openAdmin();}
  else{document.getElementById("pwErr").style.display="block";}
}
function openAdmin(){document.getElementById("adminPanel").classList.add("open");renderFaq();}
function closeAdmin(){document.getElementById("adminPanel").classList.remove("open");}
function tab(t,btn){
  document.querySelectorAll(".atab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  if(t==="faq")renderFaq();else renderStats();
}

// FAQ 관리
function renderFaq(){
  const b=document.getElementById("abody");
  b.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-size:14px;font-weight:700;color:#111827">FAQ 목록 (${faqs.length}개)</div>
      <button class="btn1" onclick="showAdd()">+ FAQ 추가</button>
    </div>
    <div id="addForm" style="display:none;background:#eff6ff;border:1.5px solid #2563eb;border-radius:12px;padding:1rem;margin-bottom:1rem">
      <div style="font-size:13px;font-weight:700;color:#1e3a8a;margin-bottom:10px">새 FAQ 추가</div>
      <select id="nCat">${Object.keys(CATS).concat(["기타"]).map(c=>`<option>${c}</option>`).join("")}</select>
      <input id="nQ" class="inp2" placeholder="질문 내용"/>
      <textarea id="nA" class="inp2" rows="3" placeholder="답변 내용"></textarea>
      <div style="display:flex;gap:8px">
        <button class="btn2" onclick="document.getElementById('addForm').style.display='none'" style="flex:1">취소</button>
        <button class="btn1" onclick="addFaq()" style="flex:2">저장</button>
      </div>
    </div>
    ${faqs.map(f=>`
    <div class="faqItem" id="fi${f.id}">
      <div class="faqRow">
        <span class="catBadge" style="background:${CAT_COLOR[f.cat]||"#6b7280"};margin-top:2px">${f.cat}</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:#111827;margin-bottom:2px">Q. ${f.q}</div>
          <div style="font-size:11px;color:#6b7280;line-height:1.5">A. ${f.a}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button onclick="editFaq(${f.id})" style="padding:4px 9px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;font-size:11px;color:#1d4ed8;cursor:pointer">수정</button>
          <button onclick="delFaq(${f.id})" style="padding:4px 9px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:11px;color:#dc2626;cursor:pointer">삭제</button>
        </div>
      </div>
    </div>`).join("")}`;
}
function showAdd(){document.getElementById("addForm").style.display="block";}
function addFaq(){
  const q=document.getElementById("nQ").value.trim(),a=document.getElementById("nA").value.trim();
  if(!q||!a)return alert("질문과 답변을 모두 입력해주세요.");
  faqs.push({id:Date.now(),cat:document.getElementById("nCat").value,q,a});
  ls("daon-faqs",faqs);renderFaq();
}
function delFaq(id){
  if(!confirm("삭제하시겠습니까?"))return;
  faqs=faqs.filter(f=>f.id!==id);ls("daon-faqs",faqs);renderFaq();
}
function editFaq(id){
  const f=faqs.find(x=>x.id===id);if(!f)return;
  document.getElementById("fi"+id).innerHTML=`
    <div style="padding:12px 13px;background:#fffbeb">
      <select id="ec${id}">${Object.keys(CATS).concat(["기타"]).map(c=>`<option${c===f.cat?" selected":""}>${c}</option>`).join("")}</select>
      <input id="eq${id}" class="inp2" value="${f.q.replace(/"/g,"&quot;")}"/>
      <textarea id="ea${id}" class="inp2" rows="3">${f.a}</textarea>
      <div style="display:flex;gap:8px">
        <button class="btn2" onclick="renderFaq()" style="flex:1">취소</button>
        <button class="btn1" onclick="saveFaq(${id})" style="flex:2">저장</button>
      </div>
    </div>`;
}
function saveFaq(id){
  faqs=faqs.map(f=>f.id===id?{...f,cat:document.getElementById("ec"+id).value,q:document.getElementById("eq"+id).value,a:document.getElementById("ea"+id).value}:f);
  ls("daon-faqs",faqs);renderFaq();
}

// 통계
function renderStats(){
  const cats={},days={};
  qlog.forEach(q=>{
    cats[q.cat]=(cats[q.cat]||0)+1;
    const d=new Date(q.ts).toLocaleDateString("ko-KR");
    days[d]=(days[d]||0)+1;
  });
  const maxC=Math.max(1,...Object.values(cats));
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  document.getElementById("abody").innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem">
      ${[{l:"총 문의 수",v:qlog.length,c:"#2563eb"},{l:"카테고리",v:Object.keys(cats).length,c:"#7c3aed"},{l:"오늘 문의",v:Object.values(days).slice(-1)[0]||0,c:"#059669"}].map(k=>`
      <div style="background:#f8faff;border-radius:12px;padding:1rem;border:1px solid #e5e7eb;text-align:center">
        <div style="font-size:26px;font-weight:800;color:${k.c}">${k.v}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:3px">${k.l}</div>
      </div>`).join("")}
    </div>
    <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:10px">카테고리별 빈도</div>
    ${qlog.length===0?'<div style="text-align:center;color:#9ca3af;padding:2rem;font-size:12px">아직 문의 데이터가 없습니다.</div>'
    :sorted.map(([cat,cnt])=>`
      <div style="margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="font-weight:600">${cat}</span><span style="color:#6b7280">${cnt}건</span>
        </div>
        <div class="bar"><div style="height:100%;width:${cnt/maxC*100}%;background:${CAT_COLOR[cat]||"#2563eb"};border-radius:3px"></div></div>
      </div>`).join("")}
    <div style="font-size:13px;font-weight:700;color:#111827;margin:1.25rem 0 10px">최근 문의 내역</div>
    ${[...qlog].reverse().slice(0,20).map(q=>`
      <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;align-items:flex-start">
        <span class="catBadge" style="background:${CAT_COLOR[q.cat]||"#6b7280"};margin-top:2px">${q.cat}</span>
        <div style="font-size:11px;color:#111827">${q.text}</div>
      </div>`).join("")}`;
}

</script>

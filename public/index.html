<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DAON · 딥노이드 AI 도우미</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f5ff;height:100vh;overflow:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@keyframes dotAnim{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1.2);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeIn .3s ease}
.page{display:none;height:100vh}
.page.active{display:flex}
/* 이름 입력 */
#namePage{align-items:center;justify-content:center;background:linear-gradient(145deg,#eff6ff,#dbeafe,#bfdbfe)}
.nameCard{background:white;border-radius:28px;padding:2.5rem 2rem;width:380px;box-shadow:0 20px 60px rgba(37,99,235,.12);animation:fadeIn .5s ease}
.nameCard h1{font-size:28px;font-weight:800;color:#1e3a8a;letter-spacing:-.04em;text-align:center;margin-top:12px}
.nameCard p{font-size:12px;color:#6b7280;text-align:center;margin:8px 0 24px;line-height:1.7}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:10px}
.inp:focus{border-color:#2563eb}
.btnPrimary{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.btnPrimary:disabled{background:#bfdbfe;box-shadow:none;cursor:not-allowed}
.testBadge{margin-top:1rem;padding:10px 14px;background:#fef3c7;border-radius:10px;border:1px solid #fcd34d;font-size:11px;color:#92400e;line-height:1.5}
.adminLink{margin-top:10px;text-align:center;font-size:11px;color:#9ca3af;cursor:pointer;text-decoration:underline;background:none;border:none}
/* 채팅 */
#chatPage{flex-direction:column}
.chatHeader{display:flex;align-items:center;gap:12px;padding:10px 16px;background:white;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 6px rgba(30,58,138,.06);flex-shrink:0}
.statusDot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;margin-right:4px}
.statusDot.busy{background:#f59e0b}
.chatBody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;align-items:flex-end;animation:fadeIn .25s ease}
.msg.user{flex-direction:row-reverse}
.bubble{padding:11px 15px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-width:76%}
.bubble.daon{background:white;border-radius:18px 18px 18px 4px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid #e5e7eb;color:#111827}
.bubble.user{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:18px 18px 4px 18px;color:white;box-shadow:0 4px 14px rgba(29,78,216,.22)}
.catBadge{display:inline-block;font-size:9px;font-weight:700;padding:2px 9px;border-radius:12px;margin-bottom:5px;color:white;letter-spacing:.04em}
.avatar{width:36px;height:36px;flex-shrink:0}
.userAvatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0}
.typing{display:flex;gap:5px;align-items:center;padding:13px 16px;background:white;border-radius:18px 18px 18px 4px;border:1px solid #e5e7eb}
.typing span{width:7px;height:7px;border-radius:50%;background:#93c5fd;display:inline-block}
.typing span:nth-child(1){animation:dotAnim 1.2s ease-in-out 0s infinite}
.typing span:nth-child(2){animation:dotAnim 1.2s ease-in-out .2s infinite}
.typing span:nth-child(3){animation:dotAnim 1.2s ease-in-out .4s infinite}
.chips{padding:8px 16px;background:white;border-top:1px solid #f3f4f6;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.chip{padding:5px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;font-size:11px;color:#1d4ed8;cursor:pointer;font-weight:600;white-space:nowrap}
.chatFooter{padding:10px 16px 14px;background:white;display:flex;gap:10px;flex-shrink:0}
.chatInput{flex:1;padding:12px 16px;border:1.5px solid #bfdbfe;border-radius:14px;font-size:14px;outline:none;background:#f8faff;transition:border-color .15s}
.chatInput:focus{border-color:#2563eb}
.sendBtn{width:48px;height:48px;border-radius:14px;border:none;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(29,78,216,.35);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sendBtn:disabled{background:#bfdbfe;box-shadow:none;cursor:not-allowed}
.headerBtns{display:flex;gap:6px;margin-left:auto}
.hBtn{font-size:11px;padding:5px 10px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
/* 모달 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modalBox{background:white;border-radius:20px;padding:1.5rem;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeIn .3s ease}
/* 관리자 */
.adminModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.adminModal.open{display:flex}
.adminBox{background:white;border-radius:20px;width:min(860px,95vw);height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:fadeIn .3s ease}
.adminHead{padding:1rem 1.25rem;background:#1e3a8a;display:flex;align-items:center;justify-content:space-between}
.adminTabs{padding:10px 16px;border-bottom:1px solid #e5e7eb;display:flex;gap:6px}
.aTab{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#6b7280;transition:all .15s}
.aTab.active{background:#1d4ed8;color:white}
.adminBody{flex:1;overflow-y:auto;padding:1.25rem}
.faqItem{border:1px solid #e5e7eb;border-radius:12px;margin-bottom:8px;overflow:hidden}
.faqRow{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.faqEdit{padding:12px 14px;background:#fffbeb}
.bar{height:7px;background:#f3f4f6;border-radius:4px;overflow:hidden;margin-top:4px}
.barFill{height:100%;border-radius:4px;transition:width .5s}
textarea{resize:none}
label{font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:5px}
select{width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;outline:none;margin-bottom:8px;font-family:inherit}
</style>
</head>
<body>

<!-- 이름 입력 -->
<div id="namePage" class="page active">
  <div class="nameCard">
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem">
      <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(37,99,235,.3)">
        <span style="font-size:32px">💬</span>
      </div>
      <h1>DAON</h1>
      <div style="font-size:11px;color:#60a5fa;letter-spacing:.1em;font-weight:600;margin-top:4px">DEEPNOID AI 도우미</div>
      <p>안녕하세요! 저는 딥노이드 P&C팀의<br>AI 도우미 DAON이에요 😊<br>이름을 알려주시면 도와드릴게요!</p>
    </div>
    <label>이름 <span style="color:#ef4444">*</span></label>
    <input class="inp" id="nameInp" placeholder="예: 홍길동" oninput="checkName()" onkeydown="if(event.key==='Enter')startChat()"/>
    <label style="margin-top:4px">소속 부서 <span style="font-weight:400;color:#9ca3af">(선택)</span></label>
    <input class="inp" id="deptInp" placeholder="예: 연구개발본부" onkeydown="if(event.key==='Enter')startChat()"/>
    <button class="btnPrimary" id="startBtn" onclick="startChat()" disabled>시작하기 →</button>
    <div class="testBadge">🧪 <b>테스트 버전입니다.</b> 사용 중 불편한 점이나 개선 사항을 피드백으로 남겨주세요!</div>
    <button class="adminLink" onclick="openAdminLogin()">관리자 로그인</button>
  </div>
</div>

<!-- 채팅 -->
<div id="chatPage" class="page">
  <div class="chatHeader">
    <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.25)">
    <span style="font-size:20px">💬</span>
  </div>
    <div style="flex:1">
      <div style="font-size:16px;font-weight:800;color:#1e3a8a">DAON</div>
      <div id="statusLine" style="font-size:11px;color:#10b981;display:flex;align-items:center;gap:4px">
        <span class="statusDot"></span>온라인 · 무엇이든 물어보세요
      </div>
    </div>
    <div class="headerBtns">
      <button class="hBtn" style="background:#eff6ff;color:#1d4ed8" onclick="openFeedback()">💬 피드백</button>
      <button class="hBtn" style="background:#f3f4f6;color:#6b7280" onclick="openAdminLogin()">⚙️</button>
    </div>
  </div>
  <div class="chatBody" id="chatBody"></div>
  <div class="chips" id="chips"></div>
  <div class="chatFooter">
    <input class="chatInput" id="chatInput" placeholder="궁금한 점을 자유롭게 입력하세요..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"/>
    <button class="sendBtn" id="sendBtn" onclick="sendMsg()" disabled>→</button>
  </div>
</div>

<!-- 피드백 모달 -->
<div class="modal" id="fbModal">
  <div class="modalBox">
    <div style="font-size:15px;font-weight:700;color:#1e3a8a;margin-bottom:12px">💬 피드백 남기기</div>
    <textarea id="fbText" rows="4" class="inp" style="padding:10px 14px" placeholder="불편한 점, 개선 사항 등 자유롭게 적어주세요!"></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="closeFeedback()" style="flex:1;padding:10px;background:#f3f4f6;border:none;border-radius:10px;font-size:13px;cursor:pointer">취소</button>
      <button onclick="submitFeedback()" style="flex:2;padding:10px;background:#1d4ed8;color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">제출</button>
    </div>
  </div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="modal" id="adminLoginModal">
  <div class="modalBox">
    <div style="font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:16px;text-align:center">⚙️ 관리자 로그인</div>
    <input type="password" class="inp" id="adminPwInp" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')checkAdminPw()"/>
    <div id="adminPwErr" style="font-size:12px;color:#dc2626;text-align:center;margin-bottom:8px;display:none">비밀번호가 올바르지 않습니다.</div>
    <div style="display:flex;gap:8px">
      <button onclick="closeAdminLogin()" style="flex:1;padding:10px;background:#f3f4f6;border:none;border-radius:10px;font-size:13px;cursor:pointer">취소</button>
      <button onclick="checkAdminPw()" style="flex:2;padding:10px;background:#1d4ed8;color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">확인</button>
    </div>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="adminModal" id="adminModal">
  <div class="adminBox">
    <div class="adminHead">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">⚙️</span>
        <div>
          <div style="font-size:15px;font-weight:700;color:white">DAON 관리자 모드</div>
          <div style="font-size:11px;color:#93c5fd">FAQ 수정 · 문의 분석 · 피드백</div>
        </div>
      </div>
      <button onclick="closeAdmin()" style="background:rgba(255,255,255,.15);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;font-weight:700">×</button>
    </div>
    <div class="adminTabs">
      <button class="aTab active" onclick="switchTab('faq',this)">📋 FAQ 관리</button>
      <button class="aTab" onclick="switchTab('analytics',this)">📊 문의 분석</button>
      <button class="aTab" onclick="switchTab('feedback',this)" id="fbTabBtn">💬 피드백</button>
    </div>
    <div class="adminBody" id="adminBody"></div>
  </div>
</div>

<script>
// ── 설정 ──
const ADMIN_PW = "deepnoid2024!";
const API_URL = "/api/chat";
const CAT_COLOR = {
  "법인차량":"#2563eb","직인·계약":"#7c3aed","비품·구매":"#0891b2",
  "채용·면접":"#059669","증명서·서류":"#d97706","시설·총무":"#dc2626",
  "기안·결재":"#4f46e5","출장·법인카드":"#0369a1","복리후생·HR":"#db2777","기타":"#6b7280"
};
const CATS = {
  "법인차량":["차량","운행일지","법인차","차키","주행","렌트","셀토스","스포티지"],
  "직인·계약":["직인","날인","계약서","서명","인감","공문"],
  "비품·구매":["비품","구매","소모품","사무용품","책상","키보드","마우스","스탠딩","오피스디포"],
  "채용·면접":["채용","면접","지원자","포지션","인터뷰","합격","이력서","온보딩"],
  "증명서·서류":["4대보험","증명서","재직","완납","인정서"],
  "시설·총무":["주차","출입카드","명함","에어컨","시설","모바일카드"],
  "기안·결재":["기안","품의","결재","전자결재"],
  "출장·법인카드":["출장","항공","숙소","여비","법인카드"],
  "복리후생·HR":["복리후생","휴가","연차","경조사","급여"]
};
const DEFAULT_FAQS = [
  {id:1,cat:"법인차량",q:"법인차량 운행일지는 언제까지 제출하나요?",a:"매월 5일까지 전월 운행일지 + 계기판 사진을 sh.lee@deepnoid.com으로 제출해 주세요."},
  {id:2,cat:"직인·계약",q:"직인(법인인감) 날인은 어떻게 신청하나요?",a:"① ERP 인감사용신청서 기안 ② 승인 후 이성훈 과장 Teams 방문 요청 ③ 직접 날인."},
  {id:3,cat:"증명서·서류",q:"4대보험 완납증명서 발급은 어떻게 받나요?",a:"P&C팀 김유리 대리(yrkim@deepnoid.com)에게 요청하시면 당일 발급 가능합니다."},
  {id:4,cat:"비품·구매",q:"사무용품 구매는 어떻게 요청하나요?",a:"종류·수량·용도를 이성훈 과장에게 알려주세요. 10만원 이상 시 품의서 기안 필요합니다."},
  {id:5,cat:"기안·결재",q:"기안품의서 결재라인은 어떻게 구성하나요?",a:"일반: 팀장→본부장. 10만원 이상 지출 건은 대표이사 결재까지 필요합니다."},
  {id:6,cat:"채용·면접",q:"신규입사자 온보딩 준비는 어떻게 하나요?",a:"자리세팅·장비지급은 P&C팀 담당. 웰컴런치는 팀장+동일직군 팀원 필수 참석."},
  {id:7,cat:"시설·총무",q:"주차 등록은 어떻게 하나요?",a:"차량번호를 이성훈 과장에게 Teams 메시지로 전달해 주시면 등록해 드립니다."},
  {id:8,cat:"출장·법인카드",q:"해외출장 항공권 예약은 어떻게 하나요?",a:"출발일·목적지·인원을 P&C팀에 사전 요청해 주세요. 법인카드 한도: 재경팀 한유정 대리."},
  {id:9,cat:"시설·총무",q:"명함 제작은 어떻게 신청하나요?",a:"이성훈 과장에게 명함 정보 전달 → 시안 확인 후 회신 → 약 3~5 영업일 제작."},
  {id:10,cat:"시설·총무",q:"모바일 출입카드 재발급은?",a:"폰을 교체하셨다면 이성훈 과장에게 Teams로 재발급을 요청해 주세요."}
];

// ── 상태 ──
let userName = "", userDept = "", busy = false, currentAdminTab = "faq";
let messages = [];
let faqs = JSON.parse(localStorage.getItem("daon-faqs") || "null") || DEFAULT_FAQS;
let questions = JSON.parse(localStorage.getItem("daon-qs") || "[]");
let feedbacks = JSON.parse(localStorage.getItem("daon-feedback") || "[]");

// ── 유틸 ──
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function classify(t){
  t=t.toLowerCase();
  for(const[cat,kws]of Object.entries(CATS)) if(kws.some(k=>t.includes(k))) return cat;
  return "기타";
}
function buildSys(){
  return `당신은 딥노이드(Deepnoid) 임직원을 위한 AI 도우미 DAON입니다.
P&C팀 업무 지침을 바탕으로 친절하고 따뜻하게 한국어로 답변합니다.
답변은 3~5줄로 간결하게, 담당자 연락처를 포함하세요.
항상 "${userName}님"이라고 부르며 친근하게 대화하세요.

[FAQ 지식베이스]
${faqs.map(f=>`[${f.cat}] Q:${f.q} A:${f.a}`).join("\n")}

모르는 내용: "P&C팀 이성훈 과장(sh.lee@deepnoid.com / 010-9588-0153)에게 문의해 주세요."
모든 답변 끝에 반드시: "더 궁금한 점이 있으시면 언제든지 말씀해 주세요 😊" 추가.`;
}
function avatarSVG(size){
  return `<div style="width:${size}px;height:${size}px;border-radius:${Math.round(size*0.35)}px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,.2)"><span style="font-size:${Math.round(size*0.45)}px">💬</span></div>`;
}

// ── 이름 입력 ──
function checkName(){
  document.getElementById("startBtn").disabled = !document.getElementById("nameInp").value.trim();
}
function startChat(){
  const n = document.getElementById("nameInp").value.trim();
  if(!n) return;
  userName = n;
  userDept = document.getElementById("deptInp").value.trim();
  document.getElementById("namePage").classList.remove("active");
  document.getElementById("chatPage").classList.add("active");
  initChat();
}

// ── 채팅 초기화 ──
function initChat(){
  messages = [];
  document.getElementById("chatBody").innerHTML = "";
  addMsg("daon", `안녕하세요, ${userName}님! 👋\n\n저는 딥노이드 P&C팀 AI 도우미 DAON이에요.\n법인차량, 직인 날인, 비품 구매, 증명서 발급 등\n업무 관련 궁금한 점을 편하게 물어봐 주세요! 😊`);
  const chips = ["법인차량 운행일지 제출","직인 날인 신청","비품 구매 요청","4대보험 완납증명서"];
  document.getElementById("chips").innerHTML = chips.map(q=>`<button class="chip" onclick="quickSend('${q}')">${q}</button>`).join("");
  document.getElementById("chatInput").addEventListener("input",function(){
    document.getElementById("sendBtn").disabled = !this.value.trim() || busy;
  });
}

// ── 메시지 추가 ──
function addMsg(role, text, cat){
  const body = document.getElementById("chatBody");
  const div = document.createElement("div");
  div.className = "msg " + role + " fade";
  if(role === "daon"){
    div.innerHTML = `<div class="avatar">${avatarSVG(36)}</div>
      <div><div class="bubble daon">${text.replace(/</g,"&lt;")}</div></div>`;
  } else {
    const badge = cat ? `<div class="catBadge" style="background:${CAT_COLOR[cat]||"#6b7280"}">${cat}</div><br>` : "";
    div.innerHTML = `<div class="userAvatar">${userName[0]}</div>
      <div><div>${badge}</div><div class="bubble user">${text.replace(/</g,"&lt;")}</div></div>`;
  }
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  if(role === "user") messages.push({role:"user",content:text});
  else messages.push({role:"assistant",content:text});
}

function showTyping(){
  const body = document.getElementById("chatBody");
  const div = document.createElement("div");
  div.className = "msg daon fade"; div.id = "typingMsg";
  div.innerHTML = `<div class="avatar">${avatarSVG(36)}</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function hideTyping(){ const el=document.getElementById("typingMsg"); if(el)el.remove(); }

function setBusy(b){
  busy = b;
  document.getElementById("sendBtn").disabled = b || !document.getElementById("chatInput").value.trim();
  const dot = document.querySelector(".statusDot");
  const line = document.getElementById("statusLine");
  if(b){ dot.classList.add("busy"); line.innerHTML='<span class="statusDot busy"></span>답변 생성 중...'; }
  else { dot.classList.remove("busy"); line.innerHTML='<span class="statusDot"></span>온라인 · 무엇이든 물어보세요'; }
}

// ── 전송 ──
async function sendMsg(text){
  text = text || document.getElementById("chatInput").value.trim();
  if(!text || busy) return;
  document.getElementById("chatInput").value = "";
  document.getElementById("sendBtn").disabled = true;
  const cat = classify(text);
  addMsg("user", text, cat);
  questions.push({text,cat,user:userName,dept:userDept,ts:Date.now()});
  lsSave("daon-qs", questions);
  setBusy(true); showTyping();
  try{
    const history = messages.slice(-10).map(m=>({role:m.role,content:m.content}));
    const res = await fetch(API_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,system:buildSys(),messages:history})
    });
    const d = await res.json();
    const reply = d.content?.[0]?.text || d.error?.message || "죄송해요, 잠시 후 다시 시도해 주세요.";
    hideTyping(); addMsg("daon", reply);
  } catch(e) {
    hideTyping(); addMsg("daon","연결 오류가 발생했어요. 잠시 후 다시 시도해 주세요.");
  }
  setBusy(false);
}
function quickSend(q){ document.getElementById("chatInput").value=q; sendMsg(q); }

// ── 피드백 ──
function openFeedback(){ document.getElementById("fbModal").classList.add("open"); }
function closeFeedback(){ document.getElementById("fbModal").classList.remove("open"); document.getElementById("fbText").value=""; }
function submitFeedback(){
  const t = document.getElementById("fbText").value.trim(); if(!t)return;
  feedbacks.push({text:t,user:userName,dept:userDept,ts:Date.now()});
  lsSave("daon-feedback",feedbacks);
  closeFeedback();
  addMsg("daon","소중한 의견 감사합니다! 더 나은 DAON이 될게요 🙏");
}

// ── 관리자 ──
function openAdminLogin(){ document.getElementById("adminLoginModal").classList.add("open"); setTimeout(()=>document.getElementById("adminPwInp").focus(),100); }
function closeAdminLogin(){ document.getElementById("adminLoginModal").classList.remove("open"); document.getElementById("adminPwInp").value=""; document.getElementById("adminPwErr").style.display="none"; }
function checkAdminPw(){
  if(document.getElementById("adminPwInp").value===ADMIN_PW){ closeAdminLogin(); openAdmin(); }
  else { document.getElementById("adminPwErr").style.display="block"; }
}
function openAdmin(){ document.getElementById("adminModal").classList.add("open"); renderAdminTab("faq"); }
function closeAdmin(){ document.getElementById("adminModal").classList.remove("open"); }
function switchTab(tab,btn){
  currentAdminTab=tab;
  document.querySelectorAll(".aTab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderAdminTab(tab);
}

function renderAdminTab(tab){
  const body = document.getElementById("adminBody");
  if(tab==="faq") renderFaqTab(body);
  else if(tab==="analytics") renderAnalyticsTab(body);
  else renderFeedbackTab(body);
}

function renderFaqTab(body){
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div style="font-size:14px;font-weight:700;color:#111827">FAQ 목록 (${faqs.length}개)</div>
    <button onclick="showAddFaq()" style="padding:7px 14px;background:#1d4ed8;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">+ FAQ 추가</button>
  </div>
  <div id="addFaqForm" style="display:none;background:#eff6ff;border:1.5px solid #2563eb;border-radius:12px;padding:1rem;margin-bottom:1rem">
    <div style="font-size:13px;font-weight:700;color:#1e3a8a;margin-bottom:10px">새 FAQ 추가</div>
    <select id="newCat">${Object.keys(CATS).concat(["기타"]).map(c=>`<option>${c}</option>`).join("")}</select>
    <input id="newQ" class="inp" placeholder="질문 내용" style="margin-bottom:8px"/>
    <textarea id="newA" class="inp" rows="3" placeholder="답변 내용" style="padding:10px 14px;margin-bottom:8px"></textarea>
    <div style="display:flex;gap:8px">
      <button onclick="hideAddFaq()" style="flex:1;padding:8px;background:#f3f4f6;border:none;border-radius:8px;font-size:12px;cursor:pointer">취소</button>
      <button onclick="addFaq()" style="flex:2;padding:8px;background:#1d4ed8;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">저장</button>
    </div>
  </div>`;
  html += faqs.map(f=>`
    <div class="faqItem" id="faq_${f.id}">
      <div class="faqRow">
        <span class="catBadge" style="background:${CAT_COLOR[f.cat]||"#6b7280"};margin-top:2px">${f.cat}</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:#111827;margin-bottom:3px">Q. ${f.q}</div>
          <div style="font-size:11px;color:#6b7280;line-height:1.5">A. ${f.a}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button onclick="editFaq(${f.id})" style="padding:4px 10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;font-size:11px;color:#1d4ed8;cursor:pointer">수정</button>
          <button onclick="deleteFaq(${f.id})" style="padding:4px 10px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:11px;color:#dc2626;cursor:pointer">삭제</button>
        </div>
      </div>
    </div>`).join("");
  body.innerHTML = html;
}

function showAddFaq(){ document.getElementById("addFaqForm").style.display="block"; }
function hideAddFaq(){ document.getElementById("addFaqForm").style.display="none"; }
function addFaq(){
  const q=document.getElementById("newQ").value.trim(), a=document.getElementById("newA").value.trim();
  if(!q||!a)return alert("질문과 답변을 모두 입력해주세요.");
  faqs.push({id:Date.now(),cat:document.getElementById("newCat").value,q,a});
  lsSave("daon-faqs",faqs); renderFaqTab(document.getElementById("adminBody"));
}
function deleteFaq(id){
  if(!confirm("삭제하시겠습니까?"))return;
  faqs=faqs.filter(f=>f.id!==id); lsSave("daon-faqs",faqs); renderFaqTab(document.getElementById("adminBody"));
}
function editFaq(id){
  const f=faqs.find(x=>x.id===id); if(!f)return;
  const el=document.getElementById("faq_"+id);
  el.innerHTML=`<div class="faqEdit">
    <select id="ec_${id}">${Object.keys(CATS).concat(["기타"]).map(c=>`<option${c===f.cat?" selected":""}>${c}</option>`).join("")}</select>
    <input id="eq_${id}" class="inp" value="${f.q.replace(/"/g,'&quot;')}" style="margin-bottom:8px;font-weight:600"/>
    <textarea id="ea_${id}" class="inp" rows="3" style="padding:10px 14px;margin-bottom:8px">${f.a}</textarea>
    <div style="display:flex;gap:8px">
      <button onclick="renderFaqTab(document.getElementById('adminBody'))" style="flex:1;padding:7px;background:#f3f4f6;border:none;border-radius:8px;font-size:12px;cursor:pointer">취소</button>
      <button onclick="saveFaq(${id})" style="flex:2;padding:7px;background:#1d4ed8;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">저장</button>
    </div>
  </div>`;
}
function saveFaq(id){
  faqs=faqs.map(f=>f.id===id?{...f,cat:document.getElementById("ec_"+id).value,q:document.getElementById("eq_"+id).value,a:document.getElementById("ea_"+id).value}:f);
  lsSave("daon-faqs",faqs); renderFaqTab(document.getElementById("adminBody"));
}

function renderAnalyticsTab(body){
  const cats={},users={};
  questions.forEach(q=>{cats[q.cat]=(cats[q.cat]||0)+1;users[q.user]=(users[q.user]||0)+1;});
  const maxC=Math.max(1,...Object.values(cats));
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  body.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem">
      ${[{l:"총 문의 건수",v:questions.length,c:"#2563eb"},{l:"카테고리 수",v:Object.keys(cats).length,c:"#7c3aed"},{l:"문의자 수",v:Object.keys(users).length,c:"#059669"}].map(k=>`
        <div style="background:#f8faff;border-radius:12px;padding:1rem;border:1px solid #e5e7eb;text-align:center">
          <div style="font-size:28px;font-weight:800;color:${k.c}">${k.v}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:3px">${k.l}</div>
        </div>`).join("")}
    </div>
    <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:10px">카테고리별 문의 빈도</div>
    ${questions.length===0?'<div style="text-align:center;color:#9ca3af;padding:2rem;font-size:12px">아직 문의 데이터가 없습니다.</div>'
    :sorted.map(([cat,cnt])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
          <span style="font-weight:600;color:#374151">${cat}</span>
          <span style="color:#6b7280">${cnt}건 (${Math.round(cnt/questions.length*100)}%)</span>
        </div>
        <div class="bar"><div class="barFill" style="width:${cnt/maxC*100}%;background:${CAT_COLOR[cat]||"#2563eb"}"></div></div>
      </div>`).join("")}
    <div style="font-size:13px;font-weight:700;color:#111827;margin:1.25rem 0 10px">최근 문의 내역</div>
    ${[...questions].reverse().slice(0,20).map(q=>`
      <div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;align-items:flex-start">
        <span class="catBadge" style="background:${CAT_COLOR[q.cat]||"#6b7280"};margin-top:2px">${q.cat}</span>
        <div><div style="font-size:11px;color:#111827">${q.text}</div>
        <div style="font-size:10px;color:#9ca3af;margin-top:1px">${q.user}${q.dept?" · "+q.dept:""}</div></div>
      </div>`).join("")}`;
}

function renderFeedbackTab(body){
  body.innerHTML=`
    <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:10px">수집된 피드백 (${feedbacks.length}건)</div>
    ${feedbacks.length===0?'<div style="text-align:center;color:#9ca3af;padding:3rem;font-size:12px">아직 피드백이 없습니다.</div>'
    :[...feedbacks].reverse().map(f=>`
      <div style="background:#f8faff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:8px">
        <div style="font-size:12px;color:#111827;line-height:1.6;margin-bottom:6px">${f.text}</div>
        <div style="font-size:10px;color:#9ca3af">${f.user}${f.dept?" · "+f.dept:""} · ${new Date(f.ts).toLocaleDateString("ko-KR")}</div>
      </div>`).join("")}`;
}
</script>
